; --- Make alarm car always be by ammo 
modify:
{
	match:
	{
		"classname" "info_gamemode"
	}
	delete:
	{
		"OnVersus" "car_alarm_spawner_versusPickRandom0-1"
	}
	insert:
	{
		"OnVersus" "car_alarm_03ForceSpawn0-1"
		"OnVersus" "car_alarm_fake01ForceSpawn0-1"
		"OnVersus" "car_alarm_fake02ForceSpawn0-1"
		"OnVersus" "car_alarm_fake04ForceSpawn0-1"
		"OnVersus" "car_alarm_fake05ForceSpawn0-1"
	}
}
