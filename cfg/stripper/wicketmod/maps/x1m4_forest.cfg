; --- Run nav fixes script
add:
{
	"classname" "logic_auto"
	"OnMapSpawn" "director,RunScriptFile,nav_fixes/x1m4_forest_navfixes,20,-1"
}
; --- Fix props disappearing by toggling shadows on map start / round change
add:
{
	"classname" "logic_auto"
	"OnMapSpawn" "_props_shadow_fix,EnableShadow,,30,-1"
	"OnMapSpawn" "_props_shadow_fix,DisableShadow,,31,-1"
	"OnMapSpawn" "forest_hittable,EnableShadow,,30,-1"
	"OnMapSpawn" "forest_hittable,DisableShadow,,31,-1"
	"OnMapSpawn" "_props_shadow_fix,EnableShadow,,90,-1"
	"OnMapSpawn" "_props_shadow_fix,DisableShadow,,91,-1"	
}
