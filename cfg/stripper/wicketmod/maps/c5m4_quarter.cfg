modify:
{
	match:
	{
		"targetname" "tractor_button"
	}
	insert:
	{
		"OnPressed" "float_exploit_blockerKill30-1"
	}
}
; <remove block on survival gamemode>
{
	match:
	{
		"hammerid" "3806493"
	}
	insert:
	{
		"OnSurvival" "float_exploit_blockerKill0-1"
	}
}
