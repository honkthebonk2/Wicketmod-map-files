; =====================================================
; ================  RL4D2L ADDITIONS  =================
; =====================================================
; By Wicket and devilesk
; --- portal relay go
; --- free up some entity slots since we're adding so much
filter:
{
	"targetname" "local_fog"
}
{
	"targetname" "ball_btns"
}
{
	"parentname" "picg_panel"
}
{
	"SourceEntityName" "speaker"
}
{
	"targetname" "speaker"
}
{
	"targetname" "cake_branch*"
}
{
	"targetname" "z_spawn*"
}
{
	"targetname" "jk_tanks"
}
; --- Change Nav Mesh to block common from spawning in new tent
add:
{
	"classname" "logic_auto"
	"OnMapSpawn" "director,RunScriptFile,nav_changes/l4d2_stadium5_stadium_navchanges,30,-1"
}
; --- remove the 2 melees near the easter egg
filter:
{
	"hammerid" "2090956"
}
{
	"hammerid" "2300621"
}
modify:
{
	match:
	{
		"classname" "info_gamemode"
	}
	insert:
	{
		"OnVersusPostIO" "!selfRunScriptCodeConvars.SetValue("z_common_limit", "25")3-1"
	}
}
