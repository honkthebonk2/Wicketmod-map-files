; --- make grate unlock immediately upon walking up to it
add:
{
	"model" "*55"
	"spawnflags" "1"
	"angles" "90 0 0"
	"origin" "6535 -4802 310"
	"targetname" "early_grate"
	"filtername" "filter_surv"
	"classname" "trigger_once"
	"OnTrigger" "radio_btnKill0.1-1"
	"OnTrigger" "radio_btn_nopatienceKill0.1-1"
	"OnTrigger" "btn_relayKill0.1-1"
	"OnTrigger" "btn_relayCancelPending0-1"
	"OnTrigger" "evaclead_5PlaySound0.11"
