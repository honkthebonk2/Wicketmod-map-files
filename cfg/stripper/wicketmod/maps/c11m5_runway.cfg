; By Wicket
; --- TLS removals
modify:
{
	match:
	{
		"classname" "info_gamemode"
	}
	insert:
	{
		; --- Ladder removal - I like mine better
		"OnVersusPostIO" "anv_mapfixes_ladder_boardingtables_cloned_cargocontainerfrontKill25-1"
		"OnVersusPostIO" "anv_mapfixes_ladder_catertruckleft1_cloned_escapeplanerightKill25-1"
		"OnVersusPostIO" "anv_mapfixes_ladder_catertruckleft2_cloned_escapeplanerightKill25-1"
		"OnVersusPostIO" "anv_mapfixes_ladder_catertruckright1_cloned_escapeplanerightKill25-1"
		"OnVersusPostIO" "anv_mapfixes_ladder_catertruckright2_cloned_escapeplanerightKill25-1"
		"OnVersusPostIO" "anv_mapfixes_ladder_skybridgeleft_cloned_skybridgemidKill25-1"
		"OnVersusPostIO" "anv_mapfixes_ladder_collapsedbuildingdoor_cloned_cargocontainerfrontKill25-1"
		"OnVersusPostIO" "anv_mapfixes_ladder_wreckedengine_cloned_escapeplaneleftKill25-1"
		; --- Angled survivor clip over boarding gate (can be re-enabled if angled blockers get fixed) (#34)
		"OnVersusPostIO" "anv_mapfixes_nav_skybridge,Kill,,30,-1"
	}
}
; --- Make crash trigger happen instantly
{
