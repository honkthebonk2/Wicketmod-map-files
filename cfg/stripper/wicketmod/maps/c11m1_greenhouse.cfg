{
	match:
	{
		"hammerid" "1948970"
	}
	replace:
	{
		"classname" "weapon_spawn"
		"spawnflags" "2"
	}
	insert:
	{
		"weapon_selection" "tier1_shotgun"
		"spawn_without_director" "1"
	}
}
{
	match:
	{
		"hammerid" "1948988"
	}
	replace:
	{
		"classname" "weapon_spawn"
		"spawnflags" "2"
