modify:
; --- fix saferooms having no shotgun/uzi/disappearing weapon spawns
{
	; no uzi fix
	match:
	{
		"hammerid" "1833723"
	}
	replace:
	{
		"weapon_selection" "any_rifle"
	}
}
{
	; no shotgun fix
	match:
	{
		"hammerid" "1833642"
	}
	replace:
	{
		"weapon_selection" "tier2_shotgun"
	}
}
filter:
{
	"hammerid" "1833737"
}
