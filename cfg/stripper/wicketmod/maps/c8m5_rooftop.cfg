; =====================================================
; ===========  PROMOD SAFEROOM WEAPONS FIX  ===========
; =====================================================
modify:
; --- fix saferooms having no shotgun/uzi/disappearing weapon spawns
{
	; no uzi fix
	match:
	{
		"hammerid" "3319417"
	}
	replace:
	{
		"weapon_selection" "weapon_smg_silenced"
	}
}
{
	; no shotgun fix
	match:
	{
		"hammerid" "3319415"
	}
	replace:
	{
		"weapon_selection" "weapon_shotgun_chrome"
	}
}
{
	; remove hr
	filter:
	{
		"hammerid" "3319419"
	}
}

